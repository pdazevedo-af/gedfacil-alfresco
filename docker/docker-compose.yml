version: '3.4'
services:
  gedfacil-alfresco-share:
    image: alfresco-share-gedfacil-alfresco:development
    build:
      dockerfile: ./Dockerfile
      context: ../../../gedfacil-alfresco-share-docker/target
    environment:
      CATALINA_OPTS: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=0.0.0.0:8888"
      REPO_HOST: gedfacil-alfresco-acs
      REPO_PORT: 8080
    ports:
      - "${share.port}:8080"
      - "${share.debug.port}:8888"
  gedfacil-alfresco-acs:
    image: alfresco-content-services-gedfacil-alfresco:development
    build:
      dockerfile: ./Dockerfile
      context: ../../../gedfacil-alfresco-platform-docker/target
    environment:
      JAVA_TOOL_OPTIONS: "${keystore.settings}"
      JAVA_OPTS: "
        -Dsolr.secureComms=secret
        -Dsolr.sharedSecret=secret
        -Dsample.site.disabled=true
        -Dmessaging.broker.url=\"failover:(nio://gedfacil-alfresco-activemq:61616)?timeout=3000&jms.useCompression=true\"
        -Dlog4j2.configurationFile=file:/usr/local/tomcat/shared/classes/alfresco/extension/dev-log4j2.properties
        "
      CATALINA_OPTS: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=0.0.0.0:8888"
    ports:
      - "${acs.port}:8080"
      - "${acs.debug.port}:8888"
    volumes:
      - gedfacil-alfresco-acs-volume:/usr/local/tomcat/alf_data
    depends_on:
      gedfacil-alfresco-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/alfresco/api/-default-/public/alfresco/versions/1/probes/-ready-"]
      interval: 30s
      timeout: 20s
      retries: 5
      start_period: 60s
  gedfacil-alfresco-postgres:
    image: postgres:16.5
    environment:
      POSTGRES_DB: alfresco
      POSTGRES_USER: alfresco
      POSTGRES_PASSWORD: alfresco
    command: postgres -c max_connections=300 -c log_min_messages=LOG
    ports:
      - "${postgres.port}:5432"
    volumes:
      - gedfacil-alfresco-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alfresco -d alfresco"]
      interval: 10s
      timeout: 5s
      retries: 5
  gedfacil-alfresco-ass:
    image: alfresco/alfresco-search-services:2.0.15
    environment:
      SOLR_ALFRESCO_HOST: gedfacil-alfresco-acs
      SOLR_ALFRESCO_PORT: 8080
      SOLR_SOLR_HOST: gedfacil-alfresco-ass
      SOLR_SOLR_PORT: 8983
      SOLR_CREATE_ALFRESCO_DEFAULTS: alfresco,archive
      ALFRESCO_SECURE_COMMS: "secret"
      JAVA_TOOL_OPTIONS: "-Dalfresco.secureComms.secret=secret"
    ports:
      - "8983:8983"
    volumes:
      - gedfacil-alfresco-ass-volume:/opt/alfresco-search-services/contentstore
      - gedfacil-alfresco-ass-volume:/opt/alfresco-search-services/data
  gedfacil-alfresco-activemq:
      image: alfresco/alfresco-activemq:5.18-jre17-rockylinux8
      mem_limit: 1g
      ports:
        - 8161:8161 # Web Console
        - 5672:5672 # AMQP
        - 61616:61616 # OpenWire
        - 61613:61613 # STOMP
      healthcheck:
        test: ["CMD", "curl", "-f", "http://localhost:8161/admin/"]
        interval: 20s
        timeout: 10s
        retries: 3

volumes:
  gedfacil-alfresco-acs-volume:
    external: true
  gedfacil-alfresco-db-volume:
    external: true
  gedfacil-alfresco-ass-volume:
    external: true
